<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supreme Barnacle • ESQET Minerva</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600&family=DM+Mono:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-chtml.min.js"></script>
    <style>
        :root {
            --bg: #f8f4eb;
            --text: #0d0d0f;
            --gold: #c8972a;
            --accent: #1a6b6b;
        }
        [data-theme="dark"] {
            --bg: #0d0d0f;
            --text: #e8e2d6;
            --gold: #e8b66a;
            --accent: #4ab3b3;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'EB Garamond', serif;
            margin: 0;
            transition: background 0.4s;
        }
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: rgba(13,13,15,0.95);
            backdrop-filter: blur(12px);
            z-index: 100;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }
        .toggle {
            background: none;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-family: 'DM Mono', monospace;
        }
        #rauzy-canvas { border: 1px solid rgba(200,151,42,0.3); }
        /* ... rest of your previous styles ... */
    </style>
</head>
<body data-theme="light">

<nav>
    <div class="logo">SUPREME <span style="color:var(--gold)">BARNACLE</span></div>
    <button class="toggle" onclick="toggleTheme()">🌗 Dark Mode</button>
</nav>

<!-- Your existing hero, metrics, sections... -->

<script>
function toggleTheme() {
    const body = document.body;
    const current = body.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    body.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
}

// Load saved preference
if (localStorage.getItem('theme') === 'dark') {
    document.body.setAttribute('data-theme', 'dark');
}
</script>
</body>
</html>
