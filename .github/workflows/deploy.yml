name: Deploy Framework Site to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Assets
        uses: actions/checkout@v4

      - name: Set Up Python Standard Workspace
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Generate Production Web Interface
        run: |
          cat << 'INNER_EOF' > run_build.py
          import os

          manifest_path = "riemannian_optimization/COHERENCE_EXHAUSTION_MANIFEST.txt"
          template_path = "riemannian_optimization/index.html"
          output_path = "index.html"

          # Verify that template and manifest assets exist before processing
          if not os.path.exists(manifest_path):
              raise FileNotFoundError(f"Missing required manifest asset at: {manifest_path}")
          if not os.path.exists(template_path):
              raise FileNotFoundError(f"Missing target HTML template at: {template_path}")

          with open(manifest_path, "r", encoding="utf-8") as f:
              manifest_data = f.read()

          with open(template_path, "r", encoding="utf-8") as f:
              template = f.read()

          # Dynamic injection: Replaces a placeholder or appends the data directly
          if "{{MANIFEST_DATA}}" in template:
              production_html = template.replace("{{MANIFEST_DATA}}", manifest_data)
          else:
              # Fallback behavior: Append the manifest inside a structural container before the closing body tag
              injection_string = f"\n<div id='manifest-data' style='display:none;'>{manifest_data}</div>\n</body>"
              production_html = template.replace("</body>", injection_string)

          with open(output_path, "w", encoding="utf-8") as f:
              f.write(production_html)

          print("SUCCESS: Production Web Interface compiled with explicit manifest injection.")
          INNER_EOF
          python3 run_build.py
          rm -f run_build.py

      - name: Deploy Production Build to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages
