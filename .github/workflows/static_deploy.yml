name: Deploy Framework Site to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Assets
        uses: actions/checkout@v4

      - name: Set Up Python Standard Workspace
        uses: actions/setup-python@v5
        with:
          python-python-version: '3.10'

      - name: Generate Production Web Interface
        run: |
          cat << 'INNER_EOF' > run_build.py
          import os
          manifest_path = "riemannian_optimization/COHERENCE_EXHAUSTION_MANIFEST.txt"
          with open(manifest_path, "r") as f:
              manifest_data = f.read()
          
          with open("riemannian_optimization/index.html", "r") as f:
              template = f.read()
              
          with open("index.html", "w") as f:
              f.write(template)
          INNER_EOF
          python3 run_build.py
          rm -f run_build.py

      - name: Deploy Production Build to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages
